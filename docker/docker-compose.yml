# docker-compose.yml — FreeKill Web full stack.
# Run from this directory (freekill-web/docker/). Build context is the REPO ROOT
# (../../ = E:/Games/freekill) so images can reach the sibling repos
# (freekill-web-asio = the Web-only server fork, FreeKill-release, FreeKill-sourcecode)
# + the freekill-web workspace.
#
#   FK_DOMAIN=play.example.com docker compose up -d --build
#
# Prereqs: a domain whose A/AAAA record points at this VPS, ports 80+443 open.

name: freekill-web

services:
  # C++ game server (TCP/UDP 9527). Internal only — never exposed publicly; the
  # gateway reaches it over the compose network as host "asio".
  asio:
    build:
      context: ../../
      dockerfile: freekill-web/docker/asio.Dockerfile
    restart: unless-stopped
    volumes:
      # Persist accounts/stats/RSA keys across restarts + upgrades.
      - asio-server:/app/server
    # No ports: published — internal network access only (security).
    expose:
      - "9527"

  # Node WSS↔asio bridge (9528). Internal only; Caddy proxies /ws to it.
  gateway:
    build:
      context: ../../
      dockerfile: freekill-web/docker/gateway.Dockerfile
    restart: unless-stopped
    environment:
      # asio is reachable by service name on the compose network.
      ASIO_HOST: asio
      ASIO_PORT: "9527"
      # Web-only fork: asio runs with checkClientMd5=false (see
      # docker/freekill.server.config.json), so it IGNORES the client MD5 the gateway
      # sends — no FK_MD5 recompute needed when you add/remove packages. The gateway's
      # config.ts default value is still sent but not validated. Resource/pack version
      # is conveyed by the SetServerSettings manifest instead. (Only set FK_MD5 here if
      # you flip checkClientMd5 back to true for upstream-compatible strict checking;
      # recompute with freekill-web/packages/assets/scripts/compute-md5.mjs.)
      FK_VERSION: "0.5.20"
    expose:
      - "9528"
    depends_on:
      - asio

  # Public entry: serves the web static files + proxies /ws → gateway.
  # Plain HTTP on host port 8088 (no domain available on this VPS). For a real
  # domain + auto-HTTPS later, restore the {$FK_DOMAIN} Caddyfile + FK_DOMAIN env
  # and publish 80/443 instead.
  caddy:
    build:
      context: ../../
      dockerfile: freekill-web/docker/caddy.Dockerfile
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - gateway

volumes:
  asio-server:
  caddy-data:
  caddy-config:
